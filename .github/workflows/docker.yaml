name: Build and Push Docker Images
on:
    push:
        branches:
            - master

jobs:
    build:
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: write

        strategy:
            matrix:
                include:
                    - service: backend
                      context: ./backend
                    - service: collector
                      context: ./collector
                    - service: dashboard
                      context: ./dashboard

        steps:
            - uses: actions/checkout@v6

            - name: Log in to GHCR
              uses: docker/login-action@v4
              with:
                  registry: ghcr.io
                  username: ${{ github.repository_owner }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Build and push ${{ matrix.service }}
              uses: docker/build-push-action@v7
              with:
                  context: ${{ matrix.context }}
                  push: true
                  tags: ghcr.io/${{ github.repository_owner }}/metrics-${{ matrix.service }}:latest
